spring:
  datasource:
    url: jdbc:oracle:thin:@//oracle:1521/FREEPDB1
    username: appuser
    password: apppassword
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
    show-sql: false
    open-in-view: false