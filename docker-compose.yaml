version: '3.9'

# Local/dev stack. Every service's application.yaml normally pulls DB / Kafka / Redis
# settings from an external Spring Cloud Config server (spring.cloud.config.name:
# db-config, kafka, redis-server, <service>-service) that is NOT part of this repo.
# For docker-compose we disable that lookup (SPRING_CLOUD_CONFIG_ENABLED=false) and
# inject the equivalent settings directly as environment variables instead.

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092" # host access, e.g. for a local Kafka UI or CLI tools
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Two listeners: one for other containers on the docker network (kafka:29092),
      # one for tools running on the host machine (localhost:9092).
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Community image, no Oracle account / license click-through required.
  # Swap for Postgres + a different JDBC driver if you'd rather not pull ~2GB.
  oracle:
    image: gvenzl/oracle-free:23-slim
    container_name: oracle
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: oraclepassword
      APP_USER: appuser
      APP_USER_PASSWORD: apppassword
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s
  
  config-server:
    build:
      context: .
      dockerfile: config-server/Dockerfile
    container_name: config-server
    ports:
      - "9690:9690"
    environment:
      SPRING_PROFILES_ACTIVE: native
      SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCHLOCATIONS: >-
        file:///config-repo/{application}/{profile}/,file:///config-repo/{profile}/
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9690/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: order-service
    depends_on:
      kafka:
        condition: service_healthy
      oracle:
        condition: service_healthy
      config-server: 
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      CONFIG_SERVER_URL: http://config-server:9690
      SERVER_PORT: 8080
      SPRING_CLOUD_CONFIG_ENABLED: "true"

  inventory-service:
    build:
      context: .
      dockerfile: inventory-service/Dockerfile
    container_name: inventory-service
    depends_on:
      kafka:
        condition: service_healthy
      oracle:
        condition: service_healthy
      redis:
        condition: service_healthy
      config-server: 
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      CONFIG_SERVER_URL: http://config-server:9690
      SERVER_PORT: 8081
      SPRING_CLOUD_CONFIG_ENABLED: "true"

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: payment-service
    depends_on:
      kafka:
        condition: service_healthy
      oracle:
        condition: service_healthy
      config-server: 
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      CONFIG_SERVER_URL: http://config-server:9690
      SERVER_PORT: 8082
      SPRING_CLOUD_CONFIG_ENABLED: "true"

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: notification-service
    depends_on:
      kafka:
        condition: service_healthy
      oracle:
        condition: service_healthy
      config-server: 
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      CONFIG_SERVER_URL: http://config-server:9690
      SERVER_PORT: 8083
      SPRING_CLOUD_CONFIG_ENABLED: "true"
